<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Explorer · kivozo.com</title>
  <meta name="description" content="Browse 84,000+ English words by prefix or suffix, with letter-by-letter filters." />
  <link rel="canonical" href="https://kivozo.com/apps/dictionary/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="kivozo.com" />
  <meta property="og:title" content="Word Explorer · kivozo.com" />
  <meta property="og:description" content="Browse 84,000+ English words by prefix or suffix, with letter-by-letter filters." />
  <meta property="og:url" content="https://kivozo.com/apps/dictionary/" />
  <meta property="og:image" content="https://kivozo.com/og/projects/dictionaries/word-explorer.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Word Explorer · kivozo.com" />
  <meta name="twitter:description" content="Browse 84,000+ English words by prefix or suffix, with letter-by-letter filters." />
  <meta name="twitter:image" content="https://kivozo.com/og/projects/dictionaries/word-explorer.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">← kivozo.com</a>
    <div class="title">📚 Word Explorer</div>
    <div class="stats" id="stats">loading…</div>
  </header>

  <main>
    <section class="controls">
      <div class="mode" role="tablist" aria-label="Search mode">
        <button id="mode-prefix" class="mode-btn active" role="tab" aria-selected="true">
          <span class="mode-label">starts with</span>
        </button>
        <button id="mode-suffix" class="mode-btn" role="tab" aria-selected="false">
          <span class="mode-label">ends with</span>
        </button>
      </div>

      <div class="search-wrap">
        <input
          id="query"
          type="search"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="search"
          enterkeyhint="search"
          placeholder="type letters…"
          aria-label="Search text"
        />
        <button id="clear-query" class="ghost" title="Clear search">×</button>
      </div>

      <fieldset class="letter-map" aria-label="Letter filters">
        <legend>
          letters
          <span class="legend-help">click: neutral → <em class="req">required</em> → <em class="forb">forbidden</em></span>
          <button id="clear-letters" class="ghost small" type="button">reset</button>
        </legend>
        <div id="letters" class="letters"></div>
      </fieldset>

      <fieldset class="length-filter" aria-label="Length filter">
        <legend>
          length
          <span class="legend-help">drag the handles to set min/max letters</span>
          <button id="clear-length" class="ghost small" type="button">reset</button>
        </legend>
        <div class="range-dual" id="range-dual">
          <div class="range-track" aria-hidden="true">
            <div class="range-fill" id="range-fill"></div>
          </div>
          <input id="min-len" type="range" min="1" max="30" value="1" aria-label="Minimum word length" />
          <input id="max-len" type="range" min="1" max="30" value="30" aria-label="Maximum word length" />
          <div class="range-bubble" id="min-bubble" aria-hidden="true">1</div>
          <div class="range-bubble" id="max-bubble" aria-hidden="true">30</div>
        </div>
        <div class="range-legend">
          <span>min <strong id="min-len-val">1</strong></span>
          <span>max <strong id="max-len-val">30</strong></span>
        </div>
      </fieldset>

      <div class="sort-row">
        <span class="sort-label-text">sort:</span>
        <div class="sort" role="radiogroup" aria-label="Sort order">
          <button id="sort-az" class="sort-btn active" role="radio" aria-checked="true" data-sort="az">A → Z</button>
          <button id="sort-za" class="sort-btn" role="radio" aria-checked="false" data-sort="za">Z → A</button>
        </div>
      </div>

      <div class="active-filters" id="active-filters" aria-live="polite"></div>
    </section>

    <section class="results">
      <div class="results-header">
        <span id="count">—</span>
        <span class="muted" id="sort-label"></span>
      </div>
      <div class="results-body">
        <div id="viewport" class="viewport" tabindex="0" aria-label="Word list">
          <div id="spacer" class="spacer"></div>
          <div id="rows" class="rows"></div>
        </div>
        <nav id="sidebar-index" class="sidebar-index" aria-label="Jump to letter"></nav>
      </div>
    </section>
  </main>

  <footer class="foot muted">
    Dictionary: engmix (mixed English, ~84k words). All filtering happens in your browser — no tracking.
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
